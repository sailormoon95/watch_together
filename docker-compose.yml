services:
  watch-together:
    build: .
    container_name: watch-together
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WATCH_HOST: 0.0.0.0
      WATCH_PORT: 3000
      WATCH_DATA_DIR: /data
    ports:
      - "127.0.0.1:3012:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/watch/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  watch-turn:
    image: coturn/coturn:4.6.3
    container_name: watch-turn
    restart: unless-stopped
    command:
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${WATCH_TURN_SHARED_SECRET:-dev-turn-secret}
      - --realm=${WATCH_TURN_REALM:-plugin-ai.ru}
      - --external-ip=${WATCH_TURN_EXTERNAL_IP:-127.0.0.1}
      - --listening-ip=0.0.0.0
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --no-cli
      - --no-tls
      - --no-dtls
      - --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
