services:
  watch-together:
    build: .
    container_name: watch-together
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WATCH_HOST: 0.0.0.0
      WATCH_PORT: 3000
      WATCH_DATA_DIR: /data
      WATCH_LIVEKIT_URL: ${WATCH_LIVEKIT_URL:-wss://plugin-ai.ru/livekit}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
    depends_on:
      - watch-livekit
    ports:
      - "127.0.0.1:3012:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/watch/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  watch-livekit:
    image: livekit/livekit-server:latest
    container_name: watch-livekit
    restart: unless-stopped
    command: --bind 0.0.0.0
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        logging:
          level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:-devkey}: "${LIVEKIT_API_SECRET:-secret}"
    ports:
      - "127.0.0.1:7880:7880"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
