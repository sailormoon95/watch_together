services:
  watch-together:
    build: .
    container_name: watch-together
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WATCH_HOST: 0.0.0.0
      WATCH_PORT: 3000
      WATCH_DATA_DIR: /data
    ports:
      - "127.0.0.1:3012:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/watch/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
